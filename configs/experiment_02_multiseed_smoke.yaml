experiment:
  name: experiment_02_multiseed_smoke
  seeds: [20260201, 20260202, 20260203]

dataset:
  directory: outputs/dataset_v2
  train_split: train.npz
  validation_split: validation.npz
  test_split: test.npz

output_directory: outputs/experiment_02

runtime:
  torch_num_threads: 1
  torch_num_interop_threads: 1

normalization:
  epsilon: 1.0e-6
  fill_value: 0.0

kalman_filter:
  process_noise: 0.02
  measurement_noise: 0.0009
  initial_position_variance: 0.05
  initial_velocity_variance: 0.25

gru:
  input_size: 7
  hidden_size: 16
  num_layers: 1
  dropout: 0.0
  future_steps: 20

training:
  epochs: 3
  batch_size: 64
  validation_batch_size: 128
  learning_rate: 0.003
  weight_decay: 0.0
  loss: smooth_l1
  early_stopping_patience: 3
  early_stopping_min_delta: 0.0
  gradient_clip_norm: 1.0
  num_workers: 0

evaluation:
  batch_size: 128
  runtime_warmup: 1
  runtime_repeats: 3
  trajectory_example_count: 4
  default_statistical_unit: episode
